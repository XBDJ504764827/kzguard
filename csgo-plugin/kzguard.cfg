// KZ Guard SourceMod 插件配置模板
//
// 使用方式：
// 1. 将此文件复制到服务器的 cfg/sourcemod/kzguard.cfg
// 2. 按实际环境修改下面的配置项
// 3. 重启地图或重启服务器让配置生效

// KZ Guard Rust 后端在线玩家上报 API
// 示例： http://192.168.0.132:3000/api/internal/server-presence/report
kzguard_api_url ""

// 网站后台中该服务器对应的 serverId
// 示例： server_123456
kzguard_server_id ""

// 网站后台中该服务器保存的 RCON 密码
// 该值用于后端校验来源服务器身份
kzguard_server_rcon_password ""

// 在线玩家上报间隔（秒）
// 建议范围： 10 - 30
kzguard_report_interval "15"
